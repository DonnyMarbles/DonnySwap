name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy docs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docs/*"
          target: "/root/backend/donnyswap-docs"
          overwrite: true
          strip_components: 1

      - name: Restart Mintlify
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            systemctl restart donnyswap-docs
            sleep 3
            systemctl is-active donnyswap-docs
