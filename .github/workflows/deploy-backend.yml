name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/*"
          target: "/root/backend/donnyswap_backend"
          overwrite: true
          strip_components: 1

      - name: Install deps and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/backend/donnyswap_backend
            npm ci --omit=dev
            systemctl restart DonnySwapAPI
            sleep 2
            systemctl is-active DonnySwapAPI
